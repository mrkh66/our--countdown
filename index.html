<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohammadreza ❤️ Bahareh</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;
    overflow-x:hidden;
    min-height:100vh;

    background:linear-gradient(135deg,#ffd6e0,#fff7fa);

    display:flex;
    justify-content:center;
    align-items:center;

}

.container{

    width:90%;
    max-width:750px;

    background:white;

    padding:40px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.15);

    z-index:5;

}

h1{

    font-size:2.8rem;
    margin-bottom:15px;

}

.subtitle{

    color:#666;
    margin-bottom:35px;

}

#countdown{

    font-size:2rem;
    font-weight:bold;
    color:#ff3366;

    margin-bottom:30px;

}

.progressContainer{

    width:100%;
    height:28px;

    background:#eee;

    border-radius:50px;

    overflow:hidden;

    margin-top:20px;

}

.progressBar{

    height:100%;
    width:0%;

    background:linear-gradient(90deg,#ff6b81,#ff3366);

    transition:1s;

}

#progressText{

    margin-top:10px;

    font-size:18px;

}

.card{

    margin-top:30px;
    padding:20px;
    background:#fff5f7;
    border-radius:15px;

}

.card h2{

    margin-bottom:10px;

}

#daysPassed{

    font-size:26px;
    color:#ff3366;

}

#clock{

    font-size:20px;
    margin-top:25px;

}

#quote{

    margin-top:30px;

    font-size:22px;

    font-style:italic;

    color:#444;

}

.footer{

    margin-top:40px;
    color:#999;

}

.heart{

    position:fixed;

    top:-50px;

    user-select:none;

    animation:fall linear forwards;

    pointer-events:none;

}

@keyframes fall{

    from{

        transform:translateY(-100px) rotate(0deg);

    }

    to{

        transform:translateY(110vh) rotate(360deg);

    }

}

.confetti{

    position:fixed;

    width:12px;
    height:12px;

    border-radius:50%;

    top:-20px;

    animation:fall 4s linear forwards;

}

@media(max-width:700px){

h1{

font-size:2rem;

}

#countdown{

font-size:1.3rem;

}

.container{

padding:25px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>❤️ Mohammadreza & Bahareh ❤️</h1>

<p class="subtitle">

Every second brings us closer together.

</p>

<div id="countdown"></div>

<div class="progressContainer">

<div class="progressBar" id="progressBar"></div>

</div>

<div id="progressText"></div>

<div class="card">

<h2>Days Already Waited ❤️</h2>

<div id="daysPassed"></div>

</div>

<div id="clock"></div>

<div id="quote"></div>

<div class="footer">

13 July 2026 ✈️❤️

</div>

</div>

<script>

const startDate = new Date("2026-06-15T00:00:00");

const reunionDate = new Date("2026-07-13T00:00:00");

const quotes=[

"Every day apart is one day closer ❤️",

"Distance means so little when someone means so much ❤️",

"Waiting is temporary. Love is forever ❤️",

"One more sunrise before we meet again ☀️",

"Our story is worth every second ❤️",

"See you soon, my love ❤️",

"Every heartbeat counts down to you ❤️"

];

document.getElementById("quote").innerHTML=

quotes[Math.floor(Math.random()*quotes.length)];

function update(){

const now=new Date();

const distance=reunionDate-now;

const total=reunionDate-startDate;

const passed=now-startDate;

let progress=(passed/total)*100;

if(progress<0)progress=0;

if(progress>100)progress=100;

document.getElementById("progressBar").style.width=progress+"%";

document.getElementById("progressText").innerHTML=

progress.toFixed(1)+"% of the waiting journey completed";

const waited=Math.floor((now-startDate)/(1000*60*60*24));

document.getElementById("daysPassed").innerHTML=waited+" Days";

document.getElementById("clock").innerHTML=

"Current Time<br>"+

now.toLocaleString();

if(distance<=0){

document.getElementById("countdown").innerHTML=

"🎉 WE ARE TOGETHER! ❤️🎉";

launchConfetti();

return;

}

const days=Math.floor(distance/(1000*60*60*24));

const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

const seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("countdown").innerHTML=

days+" Days "

+hours+" Hours "

+minutes+" Minutes "

+seconds+" Seconds";

}

setInterval(update,1000);

update();

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*25)+"px";

heart.style.animationDuration=(5+Math.random()*6)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},11000);

}

setInterval(createHeart,400);

function launchConfetti(){

for(let i=0;i<200;i++){

const c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=

"hsl("+Math.random()*360+",100%,60%)";

c.style.animationDuration=(2+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},5000);

}

}

</script>

</body>
</html>
